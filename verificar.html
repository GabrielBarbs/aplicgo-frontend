<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data:; connect-src 'self' https://srv.aplicgo.com; object-src 'none'; base-uri 'self'">
  <title>Verificar receita · Aplic &amp; Go</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --vd: #4F7A5E; --vd-deep: #3C6149; --sage: #8FA98C; --sage-soft: #E8EFE8;
      --ok: #4F7A5E; --amber: #B8841F; --red: #C0392B;
      --bg: #eef2ee; --card: #ffffff; --tx1: #1d2a22; --tx2: #54635a; --tx3: #93a097; --hair: #e6ece6;
      --shadow: 0 18px 48px rgba(43,78,57,0.12), 0 2px 8px rgba(43,78,57,0.06);
    }
    html, body { min-height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      color: var(--tx1); line-height: 1.5;
      background:
        radial-gradient(1100px 520px at 50% -10%, rgba(143,169,140,0.30), transparent 70%),
        radial-gradient(800px 600px at 100% 100%, rgba(79,122,94,0.10), transparent 60%),
        var(--bg);
      padding: 34px 16px 70px;
    }
    .wrap { max-width: 540px; margin: 0 auto; }

    .brand { text-align: center; margin: 4px 0 26px; }
    .brand img { height: 46px; width: auto; object-fit: contain; }
    .brand .tag {
      margin-top: 12px; display: inline-flex; align-items: center; gap: 7px;
      font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; font-weight: 600;
      color: var(--vd-deep); background: rgba(255,255,255,0.7); border: 1px solid var(--hair);
      padding: 6px 13px; border-radius: 999px; backdrop-filter: blur(4px);
    }
    .brand .tag i { font-size: 14px; }

    .card { background: var(--card); border: 1px solid rgba(255,255,255,0.7); border-radius: 22px; box-shadow: var(--shadow); overflow: hidden; }

    .banner { position: relative; padding: 34px 26px 30px; text-align: center; color: #fff; overflow: hidden; }
    .banner::after { content: ''; position: absolute; inset: 0; background: radial-gradient(420px 180px at 50% -40%, rgba(255,255,255,0.28), transparent 70%); pointer-events: none; }
    .banner .ring {
      width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.16); border: 1.5px solid rgba(255,255,255,0.45);
      box-shadow: 0 0 0 8px rgba(255,255,255,0.07);
    }
    .banner .ring i { font-size: 40px; line-height: 1; }
    .banner .t { font-size: 21px; font-weight: 750; letter-spacing: -0.2px; }
    .banner .d { font-size: 13.5px; opacity: 0.94; margin-top: 6px; max-width: 360px; margin-left: auto; margin-right: auto; }
    .banner.ok   { background: linear-gradient(140deg, #5C9A72 0%, #3C6149 100%); }
    .banner.warn { background: linear-gradient(140deg, #E0A340 0%, #B8841F 100%); }
    .banner.bad  { background: linear-gradient(140deg, #E0685A 0%, #C0392B 100%); }
    .banner.neutro { background: linear-gradient(140deg, #8A9A90 0%, #5C6B62 100%); }

    .corpo { padding: 24px 26px 26px; }
    .sec-tit { font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.3px; color: var(--vd); font-weight: 700; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--hair); }
    .linha { display: flex; justify-content: space-between; gap: 12px; font-size: 13.5px; padding: 6px 0; }
    .linha .k { color: var(--tx3); }
    .linha .v { color: var(--tx1); font-weight: 600; text-align: right; }

    .bloco { margin-top: 24px; }
    .med {
      position: relative; padding: 12px 14px 12px 16px; margin-bottom: 8px;
      background: #f7faf7; border: 1px solid var(--hair); border-radius: 12px;
    }
    .med::before { content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px; border-radius: 3px; background: var(--sage); }
    .med:last-child { margin-bottom: 0; }
    .med .nome { font-size: 14.5px; font-weight: 650; color: var(--tx1); }
    .med .uso { font-size: 12.5px; color: var(--tx2); margin-top: 3px; }
    .med .obs { font-size: 12px; color: var(--tx3); font-style: italic; margin-top: 3px; }

    .obs-box { font-size: 13px; color: var(--tx2); background: #f7faf7; border: 1px solid var(--hair); border-radius: 12px; padding: 13px 15px; }

    .selo { display: flex; align-items: flex-start; gap: 11px; padding: 13px 15px; border-radius: 12px; font-size: 12.5px; line-height: 1.5; }
    .selo i { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
    .selo.ok { background: rgba(79,122,94,0.09); color: var(--vd-deep); border: 1px solid rgba(79,122,94,0.25); }
    .selo.warn { background: rgba(184,132,31,0.09); color: var(--amber); border: 1px solid rgba(184,132,31,0.26); }
    .selo.bad { background: rgba(192,57,43,0.07); color: var(--red); border: 1px solid rgba(192,57,43,0.22); }
    .hash { font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 10px; color: var(--tx3); word-break: break-all; margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--hair); }

    .rodape { text-align: center; font-size: 11px; color: var(--tx3); margin-top: 24px; line-height: 1.7; }
    .rodape img { height: 16px; opacity: 0.55; vertical-align: middle; margin-bottom: 2px; }

    .loading { text-align: center; padding: 56px 0; color: var(--tx3); }
    .loading i { font-size: 32px; animation: spin 1s linear infinite; color: var(--sage); }
    .loading .skel { font-size: 13px; margin-top: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 440px) {
      .banner .t { font-size: 19px; }
      .corpo { padding: 20px 18px 22px; }
      .banner { padding: 28px 18px 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="logo.png" alt="aplic&amp;go" onerror="this.style.display='none'">
      <div class="tag"><i class="ti ti-shield-lock"></i> Verificação de autenticidade</div>
    </div>
    <div id="alvo">
      <div class="loading"><i class="ti ti-loader-2"></i><div class="skel">Verificando autenticidade…</div></div>
    </div>
    <div class="rodape">
      <img src="logo.png" alt="aplic&amp;go" onerror="this.style.display='none'"><br>
      Página oficial de verificação de receitas do Sistema Clínico Aplic &amp; Go.<br>
      Em caso de dúvida sobre a validade legal, contate a clínica emissora.
    </div>
  </div>

  <script>
    const API_BASE = 'https://srv.aplicgo.com';
    const TIPO = { BRANCA_COMUM: 'Receituário (branca comum)', BRANCA_CONTROLADA: 'Receituário de Controle Especial', AZUL_CONTROLADA: 'Receituário Azul (B)', ATESTADO: 'Atestado' };
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const fmtData = (iso) => { if (!iso) return '—'; const d = new Date(iso); return isNaN(d) ? esc(iso) : d.toLocaleString('pt-BR'); };
    const fmtDataCurta = (iso) => { if (!iso) return '—'; const d = new Date(iso); return isNaN(d) ? esc(iso) : d.toLocaleDateString('pt-BR'); };

    function getToken() {
      const u = new URLSearchParams(location.search);
      return u.get('t') || u.get('token') || location.hash.replace(/^#\/?/, '') || '';
    }

    function banner(cls, icon, titulo, desc) {
      return `<div class="banner ${cls}"><div class="ring"><i class="ti ${icon}"></i></div><div class="t">${titulo}</div>${desc ? `<div class="d">${desc}</div>` : ''}</div>`;
    }

    function render(r) {
      const alvo = document.getElementById('alvo');
      if (!r || !r.ok) {
        alvo.innerHTML = `<div class="card">${banner('neutro', 'ti-cloud-off', 'Não foi possível verificar', 'Tente novamente em instantes.')}</div>`;
        return;
      }
      if (!r.encontrada) {
        alvo.innerHTML = `<div class="card">${banner('neutro', 'ti-search-off', 'Receita não encontrada', 'O código pode estar incorreto ou a receita foi removida.')}</div>`;
        return;
      }
      const c = r.conteudo || {};
      const sig = r.assinatura || {};
      const integro = r.hash_confere;
      const assinada = sig.valida;

      let bn;
      if (!integro) {
        bn = banner('bad', 'ti-alert-triangle', 'Conteúdo adulterado', 'O conteúdo não confere com o registro original. Não aceite.');
      } else if (assinada) {
        bn = banner('ok', 'ti-rosette-discount-check', 'Receita autêntica', 'Assinatura digital Aplic verificada.');
      } else {
        bn = banner('warn', 'ti-shield-check', 'Conteúdo íntegro', 'Sem assinatura criptográfica — confere a integridade do conteúdo.');
      }

      const itens = (c.itens || []).map((i) => `
        <div class="med">
          <div class="nome">${esc(i.medicamento)}${i.dose ? ' — ' + esc(i.dose) : ''}</div>
          ${(i.frequencia || i.duracao) ? `<div class="uso">${[i.frequencia, i.duracao].filter(Boolean).map(esc).join(' · ')}</div>` : ''}
          ${i.observacoes ? `<div class="obs">${esc(i.observacoes)}</div>` : ''}
        </div>`).join('') || '<div class="med"><div class="uso">Sem itens.</div></div>';

      let selo;
      if (assinada) {
        selo = `<div class="selo ok"><i class="ti ti-certificate"></i><div><strong>Assinatura digital Aplic</strong> — verificada criptograficamente (Ed25519). O documento não foi alterado desde a emissão.</div></div>`;
      } else if (integro) {
        selo = `<div class="selo warn"><i class="ti ti-shield-half"></i><div>O conteúdo confere com o registro, mas <strong>sem assinatura criptográfica</strong>. Para validade legal de medicamentos controlados, exija assinatura ICP-Brasil.</div></div>`;
      } else {
        selo = `<div class="selo bad"><i class="ti ti-x"></i><div>Verificação falhou — não confie neste documento.</div></div>`;
      }

      alvo.innerHTML = `
        <div class="card">
          ${bn}
          <div class="corpo">
            <div class="sec-tit">${esc(TIPO[c.tipo] || 'Receituário')}</div>
            <div class="linha"><span class="k">Paciente</span><span class="v">${esc(c.paciente && c.paciente.nome || '—')}${c.paciente && c.paciente.codigo ? ' (' + esc(c.paciente.codigo) + ')' : ''}</span></div>
            <div class="linha"><span class="k">Profissional</span><span class="v">${esc(c.profissional && c.profissional.nome || r.assinante || '—')}</span></div>
            <div class="linha"><span class="k">Emitida em</span><span class="v">${fmtDataCurta(c.data)}</span></div>
            <div class="linha"><span class="k">Assinada em</span><span class="v">${fmtData(r.criado_em)}</span></div>

            <div class="bloco">
              <div class="sec-tit">${c.tipo === 'ATESTADO' ? 'Atestado' : 'Medicamentos'}</div>
              ${itens}
            </div>

            ${c.observacoes ? `<div class="bloco"><div class="sec-tit">Observações</div><div class="obs-box">${esc(c.observacoes)}</div></div>` : ''}

            <div class="bloco">
              <div class="sec-tit">Autenticidade</div>
              ${selo}
              <div class="hash">SHA-256: ${esc(r.hash)}</div>
            </div>
          </div>
        </div>`;
    }

    (async () => {
      const token = getToken();
      if (!token) { render({ ok: true, encontrada: false }); return; }
      try {
        const resp = await fetch(API_BASE + '/api/verificar/' + encodeURIComponent(token), { headers: { 'Accept': 'application/json' } });
        let data = null;
        try { data = await resp.json(); } catch (e) { data = null; }
        render(data || { ok: false });
      } catch (e) {
        render({ ok: false });
      }
    })();
  </script>
</body>
</html>
