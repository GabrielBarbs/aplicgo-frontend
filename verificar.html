<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' https://srv.aplicgo.com data:; connect-src 'self' https://srv.aplicgo.com; object-src 'none'; base-uri 'self'">
  <title>Receita Digital · Aplic &amp; Go</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --vd: #2E7D53; --vd-deep: #1E5B3B; --vd-soft: #E9F3EC;
      --ok: #2E7D53; --amber: #B8841F; --red: #C0392B;
      --bg: #eef2ee; --card: #ffffff; --tx1: #1d2a22; --tx2: #55635b; --tx3: #8b988f; --hair: #e6ece6;
      --shadow: 0 16px 44px rgba(30,91,59,0.12), 0 2px 8px rgba(30,91,59,0.06);
    }
    html, body { min-height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      color: var(--tx1); line-height: 1.5; background: var(--bg);
      padding: 22px 14px 60px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    .card { background: var(--card); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }

    /* Header verde (estilo "prontuário verde") */
    .head { background: linear-gradient(135deg, #2E7D53 0%, #1E5B3B 100%); color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .head .logo { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .head .logo img { width: 26px; height: 26px; object-fit: contain; }
    .head .logo i { font-size: 22px; }
    .head .nm { font-size: 15px; font-weight: 750; letter-spacing: -0.2px; }
    .head .sb { font-size: 11px; opacity: 0.9; letter-spacing: 0.4px; margin-top: 1px; }

    .body { padding: 20px 20px 22px; }

    .titrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
    .titrow h1 { font-size: 19px; font-weight: 750; color: var(--tx1); letter-spacing: -0.3px; }
    .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 999px; white-space: nowrap; }
    .chip i { font-size: 14px; }
    .chip.ok { background: var(--vd-soft); color: var(--vd-deep); }
    .chip.warn { background: rgba(184,132,31,0.12); color: var(--amber); }
    .chip.bad { background: rgba(192,57,43,0.10); color: var(--red); }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }
    .fld { background: #f6f9f6; border: 1px solid var(--hair); border-radius: 10px; padding: 9px 12px; }
    .fld .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--tx3); font-weight: 700; }
    .fld .v { font-size: 15px; font-weight: 700; color: var(--tx1); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .fld .v.mono { font-family: ui-monospace, 'Cascadia Code', monospace; letter-spacing: 1px; }

    /* Acordeão paciente/profissional */
    .acc { border: 1px solid var(--hair); border-radius: 10px; margin-top: 10px; overflow: hidden; }
    .acc > button { width: 100%; background: #fff; border: 0; text-align: left; padding: 12px 14px; display: flex; align-items: center; gap: 11px; cursor: pointer; font: inherit; }
    .acc > button:hover { background: #fafcfa; }
    .acc .ico { width: 30px; height: 30px; border-radius: 8px; background: var(--vd-soft); color: var(--vd); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .acc .ico i { font-size: 17px; }
    .acc .lbl { flex: 1; min-width: 0; }
    .acc .lbl .k { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--tx3); font-weight: 700; }
    .acc .lbl .v { display: block; font-size: 14.5px; font-weight: 650; color: var(--tx1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .acc .caret { color: var(--tx3); transition: transform .18s; flex-shrink: 0; }
    .acc.open .caret { transform: rotate(180deg); }
    .acc .det { max-height: 0; overflow: hidden; transition: max-height .22s ease; background: #f8faf8; }
    .acc.open .det { max-height: 240px; }
    .acc .det .in { padding: 4px 14px 13px 55px; }
    .acc .det .row { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 4px 0; border-top: 1px dashed var(--hair); }
    .acc .det .row:first-child { border-top: 0; }
    .acc .det .row .rk { color: var(--tx3); }
    .acc .det .row .rv { color: var(--tx1); font-weight: 600; text-align: right; }

    /* Receituário */
    .rx { margin-top: 20px; }
    .rx .cab { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-bottom: 9px; border-bottom: 2px solid var(--vd-soft); margin-bottom: 12px; }
    .rx .cab .t { font-size: 13.5px; font-weight: 750; color: var(--vd-deep); }
    .rx .cab .u { font-size: 10.5px; font-weight: 700; letter-spacing: 0.8px; color: var(--vd); background: var(--vd-soft); padding: 3px 9px; border-radius: 6px; }
    .via-h { font-size: 11px; font-weight: 800; letter-spacing: 0.8px; color: var(--vd-deep); background: var(--vd-soft); display: inline-block; padding: 3px 10px; border-radius: 6px; margin: 12px 0 2px; }
    .texto-livre { font-family: ui-monospace, 'Cascadia Code', Consolas, monospace; font-size: 12.5px; color: var(--tx1); line-height: 1.55; padding: 4px 0 8px; }
    .texto-livre .via-h { display: block; width: fit-content; }
    .texto-livre .tl-ln { white-space: pre-wrap; word-break: break-word; }
    .texto-livre .tl-br { height: 10px; }
    .med { display: flex; gap: 11px; padding: 11px 0; border-bottom: 1px solid var(--hair); }
    .med:last-child { border-bottom: 0; }
    .med .n { width: 24px; height: 24px; border-radius: 7px; background: var(--vd); color: #fff; font-size: 12.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .med .c { flex: 1; min-width: 0; }
    .med .c .nome { font-size: 14.5px; font-weight: 650; color: var(--tx1); }
    .med .c .pos { font-size: 12.5px; color: var(--tx2); margin-top: 3px; }
    .med .c .obs { font-size: 12px; color: var(--tx3); font-style: italic; margin-top: 2px; }

    .obs-box { font-size: 13px; color: var(--tx2); background: #f8faf8; border: 1px solid var(--hair); border-radius: 10px; padding: 12px 14px; margin-top: 14px; }
    .obs-box .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--tx3); font-weight: 700; margin-bottom: 5px; }

    /* Área da farmácia */
    .farm { margin-top: 22px; border: 1px solid var(--hair); border-radius: 12px; overflow: hidden; }
    .farm .fh { background: #f6f9f6; padding: 9px 15px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; color: var(--vd-deep); border-bottom: 1px solid var(--hair); display: flex; align-items: center; gap: 7px; }
    .farm .fb { padding: 15px; }
    .valid { display: flex; align-items: center; gap: 12px; }
    .valid .vi { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .valid .vi i { font-size: 24px; }
    .valid.ok .vi { background: var(--vd-soft); color: var(--vd); }
    .valid.exp .vi { background: rgba(192,57,43,0.10); color: var(--red); }
    .valid .vt { font-size: 15px; font-weight: 750; }
    .valid.ok .vt { color: var(--vd-deep); }
    .valid.exp .vt { color: var(--red); }
    .valid .vd { font-size: 12.5px; color: var(--tx2); margin-top: 1px; }

    .siginfo { margin-top: 13px; padding-top: 13px; border-top: 1px dashed var(--hair); font-size: 12.5px; color: var(--tx2); line-height: 1.6; display: flex; gap: 9px; }
    .siginfo i { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .siginfo.ok i { color: var(--vd); }
    .siginfo.warn i { color: var(--amber); }
    .siginfo.bad i { color: var(--red); }
    .siginfo b { color: var(--tx1); }

    .btn-dl { margin-top: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 9px; padding: 14px; background: var(--vd); color: #fff; border: 0; border-radius: 11px; font-size: 14.5px; font-weight: 700; text-decoration: none; cursor: pointer; box-shadow: 0 8px 20px rgba(46,125,83,0.28); transition: filter .15s, transform .1s; }
    .btn-dl:hover { filter: brightness(1.05); }
    .btn-dl:active { transform: translateY(1px); }
    .btn-dl i { font-size: 19px; }

    .hash { font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 9.5px; color: var(--tx3); word-break: break-all; margin-top: 16px; padding-top: 12px; border-top: 1px dashed var(--hair); line-height: 1.6; }
    .rodape { text-align: center; font-size: 11px; color: var(--tx3); margin-top: 18px; line-height: 1.7; }

    /* Estados vazios / busca por chave */
    .loading { text-align: center; padding: 54px 0; color: var(--tx3); }
    .loading i { font-size: 30px; animation: spin 1s linear infinite; color: var(--vd); }
    .loading .skel { font-size: 13px; margin-top: 13px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 30px 22px 34px; }
    .empty .ei { width: 66px; height: 66px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
    .empty .ei i { font-size: 34px; }
    .empty.neutro .ei { background: #eef1ef; color: #8b988f; }
    .empty.bad .ei { background: rgba(192,57,43,0.10); color: var(--red); }
    .empty h2 { font-size: 18px; font-weight: 750; }
    .empty p { font-size: 13.5px; color: var(--tx2); margin-top: 7px; }
    .keyform { margin-top: 18px; display: flex; gap: 8px; }
    .keyform input { flex: 1; padding: 12px 14px; border: 1.5px solid var(--hair); border-radius: 10px; font: inherit; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
    .keyform input:focus { outline: none; border-color: var(--vd); }
    .keyform button { padding: 0 18px; background: var(--vd); color: #fff; border: 0; border-radius: 10px; font: inherit; font-weight: 700; cursor: pointer; }

    @media (max-width: 440px) {
      .grid2 { grid-template-columns: 1fr; }
      .body { padding: 18px 15px 20px; }
      .titrow h1 { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="alvo">
      <div class="card"><div class="loading"><i class="ti ti-loader-2"></i><div class="skel">Carregando receita…</div></div></div>
    </div>
    <div class="rodape">
      Página oficial de verificação de receitas · Aplic &amp; Go<br>
      Em caso de dúvida sobre a validade legal, contate a clínica emissora.
    </div>
  </div>

  <script src="verificar.js" defer></script>
</body>
</html>
